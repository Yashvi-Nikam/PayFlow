<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow — Change Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-y: auto;
            padding: 20px 0;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            pointer-events: none;
        }

        .change-wrapper {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #9ca3af;
            font-size: 13px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.2s;
            cursor: pointer;
        }

        .back-link:hover { color: #6c63ff; }

        .change-card {
            background: #1a1d27;
            border: 1px solid #2d3148;
            border-radius: 24px;
            padding: 40px;
        }

        .icon-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .lock-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(108,99,255,0.1));
            border: 2px solid rgba(108,99,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: #6c63ff;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .page-subtitle {
            font-size: 13px;
            color: #6b7280;
        }

        .form-group { margin-bottom: 18px; }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 15px;
        }

        .form-input {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2d3148;
            border-radius: 12px;
            padding: 12px 42px;
            color: #ffffff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
        }

        .form-input::placeholder { color: #4b5563; }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            cursor: pointer;
            font-size: 15px;
            background: none;
            border: none;
            padding: 0;
        }

        .password-toggle:hover { color: #9ca3af; }

        .password-hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #ef4444;
        }

        .btn-update {
            width: 100%;
            background: linear-gradient(135deg, #6c63ff, #8b84ff);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(108,99,255,0.3);
            margin-top: 8px;
        }

        .btn-update:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(108,99,255,0.4);
        }

        .btn-update:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .secure-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #4b5563;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: #2d3148;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s;
            width: 0%;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 4px;
        }

        /* Forgot password info box */
        .forgot-info {
            background: rgba(108,99,255,0.1);
            border: 1px solid rgba(108,99,255,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: #9ca3af;
        }

        .forgot-info i { color: #6c63ff; margin-top: 1px; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="change-wrapper">

    <!-- Back to Dashboard -->
    <a class="back-link" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>

    <div class="change-card">
        <div class="icon-section">
            <div class="lock-icon">
                <i class="fas fa-lock"></i>
            </div>
            <div class="page-title">Change Password</div>
            <div class="page-subtitle">Update your password to keep your account secure</div>
        </div>

        <div class="error-box" id="error-box">
            <i class="fas fa-exclamation-circle"></i>
            <span id="error-text"></span>
        </div>

        <form id="change-form">
            <!-- Current Password -->
            <div class="form-group">
                <label class="form-label">Current Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password"
                           class="form-input"
                           id="current-password"
                           placeholder="Enter current password">
                    <button type="button" class="password-toggle"
                            onclick="togglePass('current-password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- New Password -->
            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password"
                           class="form-input"
                           id="new-password"
                           placeholder="Enter new password"
                           oninput="checkStrength(this.value)">
                    <button type="button" class="password-toggle"
                            onclick="togglePass('new-password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strength-fill"></div>
                </div>
                <div class="strength-text" id="strength-text" style="color:#6b7280;"></div>
                <div class="password-hint">
                    <i class="fas fa-info-circle"></i>
                    Min 8 characters with uppercase, lowercase, number and special character
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password"
                           class="form-input"
                           id="confirm-password"
                           placeholder="Confirm new password">
                    <button type="button" class="password-toggle"
                            onclick="togglePass('confirm-password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-update" id="update-btn">
                <i class="fas fa-lock"></i>
                Update Password
            </button>
        </form>

        <!-- Forgot password info -->
        <div class="forgot-info">
            <i class="fas fa-info-circle"></i>
            <span>Forgot your current password? Please contact your administrator to reset it.</span>
        </div>

        <div class="secure-note">
            <i class="fas fa-shield-alt"></i>
            Your password is encrypted and secure
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>

<script>
    (async function() {
        try {
            const res  = await fetch("http://localhost:5091/api/settings");
            const data = await res.json();
            if (data.logoPath) {
                document.querySelector(".lock-icon").style.backgroundImage =
                    `url(http://localhost:5091${data.logoPath})`;
            }
        } catch(e) {}
    })();
    // Back to dashboard based on role
    function goBack() {
        const role = getUser().role;
        if (role === "Admin") {
            window.location.href = "admin/dashboard.html";
        } else if (role === "Employee") {
            window.location.href = "employee/dashboard.html";
        } else {
            window.location.href = "index.html";
        }
    }

    function togglePass(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon  = btn.querySelector("i");
        if (input.type === "password") {
            input.type = "text";
            icon.className = "fas fa-eye-slash";
        } else {
            input.type = "password";
            icon.className = "fas fa-eye";
        }
    }

    function checkStrength(password) {
        const fill = document.getElementById("strength-fill");
        const text = document.getElementById("strength-text");

        let score = 0;
        if (password.length >= 8)           score++;
        if (/[A-Z]/.test(password))         score++;
        if (/[a-z]/.test(password))         score++;
        if (/[0-9]/.test(password))         score++;
        if (/[^A-Za-z0-9]/.test(password))  score++;

        const levels = [
            { width: "0%",   color: "#2d3148", label: "" },
            { width: "20%",  color: "#ef4444", label: "Very Weak" },
            { width: "40%",  color: "#f59e0b", label: "Weak" },
            { width: "60%",  color: "#f59e0b", label: "Fair" },
            { width: "80%",  color: "#22c55e", label: "Strong" },
            { width: "100%", color: "#22c55e", label: "Very Strong" },
        ];

        const level = levels[score];
        fill.style.width      = level.width;
        fill.style.background = level.color;
        text.textContent      = level.label;
        text.style.color      = level.color;
    }

    function showError(msg) {
        const box  = document.getElementById("error-box");
        const text = document.getElementById("error-text");
        text.textContent  = msg;
        box.style.display = "flex";
    }

    document.getElementById("change-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const current = document.getElementById("current-password").value;
        const newPass = document.getElementById("new-password").value;
        const confirm = document.getElementById("confirm-password").value;

        document.getElementById("error-box").style.display = "none";

        if (!current || !newPass || !confirm) {
            showError("Please fill in all fields.");
            return;
        }

        if (newPass !== confirm) {
            showError("New passwords do not match.");
            return;
        }

        if (newPass.length < 8) {
            showError("Password must be at least 8 characters.");
            return;
        }

        const btn = document.getElementById("update-btn");
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Updating...`;

        try {
            await AuthAPI.changePassword(current, newPass);

            showToast("Password updated! Please login again with new credentials.", "success");

            // Force logout after password change
            setTimeout(() => {
                clearUser();
                window.location.href = "index.html";
            }, 2000);

        } catch (err) {
            showError(err.message || "Failed to update password.");
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-lock"></i> Update Password`;
        }
    });
</script>

</body>
</html>
