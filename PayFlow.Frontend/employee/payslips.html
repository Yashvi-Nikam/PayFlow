<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow — My Payslips</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon" id="sidebar-logo">🎓</div>
            <div class="sidebar-brand-text">
                <h6 id="school-name">Playgroup Branch</h6>
                <span>Payroll System</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></div>
            <div class="nav-item"><a href="profile.html" class="nav-link"><i class="fas fa-user"></i> My Profile</a></div>
            <div class="nav-item"><a href="payslips.html" class="nav-link active"><i class="fas fa-receipt"></i> My Payslips</a></div>
            <div class="nav-item"><a href="attendance.html" class="nav-link"><i class="fas fa-calendar-check"></i> Attendance Overview</a></div>
        </nav>
        <div class="sidebar-footer">
            <div class="current-month-badge">
                <i class="fas fa-calendar"></i>
                <div>
                    <div class="label">Current Month</div>
                    <div class="month" id="current-month-display"></div>
                </div>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-search">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search by month or year..." oninput="filterPayslips()">
            </div>
            <div class="topbar-right">
                <div class="notif-btn"><i class="fas fa-bell"></i></div>
                <div class="user-menu" onclick="toggleUserDropdown()">
                    <div class="user-avatar" id="topbar-avatar"></div>
                    <div class="user-info">
                        <div class="name" id="topbar-username"></div>
                        <div class="role" id="topbar-role"></div>
                    </div>
                    <i class="fas fa-chevron-down" style="font-size:11px;color:#6b7280;"></i>
                </div>
                <div id="user-dropdown" style="display:none;position:absolute;top:60px;right:24px;background:#1e2130;border:1px solid #2d3148;border-radius:12px;padding:8px;min-width:180px;z-index:999;">
                    <a href="../changepassword.html" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#9ca3af;text-decoration:none;font-size:13px;"><i class="fas fa-lock"></i> Change Password</a>
                    <hr style="border-color:#2d3148;margin:6px 0;">
                    <a href="#" onclick="logout()" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#ef4444;text-decoration:none;font-size:13px;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>

        <div class="page-content">
            <div class="page-header">
                <h4>My Payslips</h4>
                <p>View your salary history and payslips</p>
            </div>

            <div class="row g-4">

                <!-- Payslips List -->
                <div class="col-lg-6">
                    <div class="table-card">
                        <div style="overflow-x:auto;">
                            <table class="custom-table">
                                <thead>
                                    <tr>
                                        <th>Month</th>
                                        <th>Net Pay</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="payslips-body">
                                    <tr><td colspan="4" style="text-align:center;padding:40px;">
                                        <div class="spinner" style="margin:0 auto;"></div>
                                    </td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div style="padding:16px 24px;border-top:1px solid #2d3148;">
                            <span style="font-size:13px;color:#6b7280;" id="showing-text">Loading...</span>
                        </div>
                    </div>
                </div>

                <!-- Payslip Detail -->
                <div class="col-lg-6">
                    <div class="card" style="padding:24px;" id="detail-card">
                        <div class="empty-state">
                            <i class="fas fa-receipt"></i>
                            <p>Select a payslip to view details</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/api.js"></script>
<script>
    requireEmployee();

    let allPayslips = [];

    function toggleUserDropdown() {
        const dd = document.getElementById("user-dropdown");
        dd.style.display = dd.style.display === "none" ? "block" : "none";
    }

    document.addEventListener("click", (e) => {
        if (!e.target.closest(".user-menu") && !e.target.closest("#user-dropdown")) {
            const dd = document.getElementById("user-dropdown");
            if (dd) dd.style.display = "none";
        }
    });

    function logout() { clearUser(); window.location.href = "../index.html"; }

    function setupTopbar() {
        const user = getUser();
        document.getElementById("topbar-username").textContent = user.username || "";
        document.getElementById("topbar-role").textContent     = "Employee";
        document.getElementById("topbar-avatar").textContent   = getInitials(user.username);
    }

    async function loadPayslips() {
        try {
            allPayslips = await ProfileAPI.getPayslips();
            filterPayslips();

            
        } catch (err) {
            showToast("Failed to load payslips.", "error");
        }
    }

    function filterPayslips() {
        const search = document.getElementById("search-input").value.toLowerCase();
        const filtered = allPayslips.filter(p =>
            getMonthName(p.month).toLowerCase().includes(search) ||
            String(p.year).includes(search)
        );
        renderPayslips(filtered);
    }

    function renderPayslips(list) {
        const tbody    = document.getElementById("payslips-body");
        const showText = document.getElementById("showing-text");

        showText.textContent = `Showing 1 to ${list.length} of ${list.length} records`;

        if (!list.length) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:40px;color:#6b7280;">No payslips found</td></tr>`;
            return;
        }

        tbody.innerHTML = list.map(p => `
            <tr style="cursor:pointer;" onclick="showDetail(${p.payrollId})">
                <td>
                    <div style="display:flex;align-items:center;gap:6px;">
                        <i class="fas fa-calendar" style="color:#6c63ff;font-size:12px;"></i>
                        ${getMonthName(p.month)} ${p.year}
                    </div>
                </td>
                <td style="font-weight:600;">${formatCurrency(p.netPay)}</td>
                <td>
                    <span class="badge-status ${p.isPaid ? 'badge-paid' : 'badge-pending'}">
                        ${p.isPaid ? "Paid" : "Pending"}
                    </span>
                </td>
                <td>
                    <button class="btn-icon view" onclick="showDetail(${p.payrollId})">
                        <i class="fas fa-eye"></i>
                    </button>
                </td>
            </tr>
        `).join("");
    }

    function showDetail(id) {
        const p = allPayslips.find(x => x.payrollId === id);
        if (!p) return;

        document.getElementById("detail-card").innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div style="width:44px;height:44px;background:var(--accent-light);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:18px;">
                        <i class="fas fa-file-invoice"></i>
                    </div>
                    <div>
                       <div style="font-size:17px;font-weight:700;color:#ffffff;">${getMonthName(p.month)} ${p.year}</div>
                       <div style="font-size:13px;color:#9ca3af;">Salary for the month of ${getMonthName(p.month)} ${p.year}</div>
                    </div>
                </div>
                <span class="badge-status ${p.isPaid ? 'badge-paid' : 'badge-pending'}" style="font-size:13px;padding:6px 14px;">
                    ${p.isPaid ? "Paid" : "Pending"}
                </span>
            </div>

            <div style="background:#0f1117;border-radius:12px;padding:20px;">
                <div style="font-size:11px;color:#22c55e;margin-bottom:14px;font-weight:600;letter-spacing:0.5px;">● EARNINGS</div>
                ${detailRow("Basic Pay", formatCurrency(p.basicPay))}
                ${detailRow("Conveyance Allowance", formatCurrency(p.allowance))}
                ${detailRow("Incentive / Bonus", formatCurrency(p.incentive))}
                ${detailRow("Other Allowances", "₹0")}

                <hr style="border-color:#2d3148;margin:14px 0;">

                <div style="font-size:11px;color:#ef4444;margin-bottom:14px;font-weight:600;letter-spacing:0.5px;">● DEDUCTIONS</div>
                ${detailRow("Deductions", formatCurrency(p.deduction))}
                ${detailRow("Other Deductions", "₹0")}

                <hr style="border-color:#2d3148;margin:14px 0;">

                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;">
                    <span style="font-size:15px;font-weight:700;color:#ffffff;">Net Pay</span>
                    <span style="font-size:22px;font-weight:700;color:#6c63ff;">${formatCurrency(p.netPay)}</span>
                </div>
            </div>

            ${p.isPaid ? `<div style="text-align:right;margin-top:8px;font-size:12px;color:#6b7280;">Paid on ${formatDate(p.paidDate)}</div>` : ""}

            <p style="font-size:11px;color:#6b7280;text-align:center;margin-top:16px;">
                <i class="fas fa-info-circle"></i> This is a system generated payslip. No signature is required.
            </p>
        `;
    }

    function detailRow(label, value) {
    return `<div style="display:flex;justify-content:space-between;margin-bottom:10px;">
        <span style="font-size:13px;color:#c4c9d4;">${label}</span>
        <span style="font-size:13px;font-weight:600;color:#ffffff;">${value}</span>
    </div>`;
}

    setupTopbar();
    setupCurrentMonth();
    loadPayslips();
    loadBranchSettings();
</script>
</body>
</html>
