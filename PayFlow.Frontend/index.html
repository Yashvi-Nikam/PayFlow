<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow — Sign In</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: auto;
        }

        /* Background glow effects */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: #1a1d27;
            border: 1px solid #2d3148;
            border-radius: 24px;
            padding: 40px;
        }

        .brand-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #6c63ff, #8b84ff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: white;
            box-shadow: 0 8px 32px rgba(108,99,255,0.3);
        }

        .brand-name {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 14px;
            color: #6c63ff;
            font-weight: 500;
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .form-subtitle {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 16px; }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 15px;
        }

        .form-input {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2d3148;
            border-radius: 12px;
            padding: 12px 16px 12px 42px;
            color: #ffffff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
        }

        .form-input::placeholder { color: #4b5563; }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            cursor: pointer;
            font-size: 15px;
            background: none;
            border: none;
            padding: 0;
            transition: color 0.2s;
        }

        .password-toggle:hover { color: #9ca3af; }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #6c63ff;
            cursor: pointer;
        }

        .remember-me span {
            font-size: 13px;
            color: #9ca3af;
        }

        .forgot-link {
            font-size: 13px;
            color: #6c63ff;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover { color: #8b84ff; }

        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #ef4444;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #6c63ff, #8b84ff);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(108,99,255,0.3);
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(108,99,255,0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .secure-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #4b5563;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .spinner-border-sm {
            width: 16px;
            height: 16px;
            border-width: 2px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Brand -->
        <div class="brand-section">
            <div class="brand-icon">🎓</div>
            <div class="brand-name">Playgroup Branch</div>
            <div class="brand-subtitle">Payroll System</div>
        </div>

        <!-- Form -->
        <div class="form-title">Sign in to your account</div>
        <div class="form-subtitle">Enter your credentials to continue</div>

        <!-- Error -->
        <div class="error-box" id="login-error">
            <i class="fas fa-exclamation-circle"></i>
            <span id="login-error-text">Invalid username or password.</span>
        </div>

        <form id="login-form">
            <!-- Username -->
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" 
                           class="form-input" 
                           id="username" 
                           placeholder="Enter your username"
                           autocomplete="username">
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" 
                           class="form-input" 
                           id="password" 
                           placeholder="Enter your password"
                           autocomplete="current-password">
                    <button type="button" class="password-toggle" id="toggle-password">
                        <i class="fas fa-eye" id="toggle-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Options -->
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember-me">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-link" onclick="showForgotMessage()">Forgot Password?</a>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-login" id="login-btn">
                <i class="fas fa-arrow-right"></i>
                Sign In
            </button>
        </form>

        <div class="secure-note">
            <i class="fas fa-shield-alt"></i>
            Secure access to your payroll system
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
function showForgotMessage() {
    const error = document.getElementById("login-error");
    const errorText = document.getElementById("login-error-text");
    errorText.textContent = "Please contact your administrator to reset your password.";
    error.style.display = "flex";
    error.style.background = "rgba(108,99,255,0.1)";
    error.style.borderColor = "rgba(108,99,255,0.3)";
    error.style.color = "#6c63ff";
}

// Load school logo on login page
(async function() {
    try {
        const res  = await fetch("http://localhost:5091/api/settings");
        const data = await res.json();
        if (data.schoolName) {
            document.querySelector(".brand-name").textContent = data.schoolName;
        }
        if (data.logoPath) {
            document.querySelector(".brand-icon").innerHTML =
                `<img src="http://localhost:5091${data.logoPath}?t=${Date.now()}"
                      style="width:100%;height:100%;object-fit:cover;border-radius:16px;">`;
        }
    } catch(e) {}
})();
</script>
</body>
</html>
